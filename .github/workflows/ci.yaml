name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - name: Flake check (current system)
        shell: bash
        run: nix develop -c just check
      - name: Evaluate all supported systems
        shell: bash
        run: nix develop -c just check-eval-all
      - name: Format check
        shell: bash
        run: nix develop -c just fmt-check
      - name: Build mo for current system
        shell: bash
        run: nix develop -c just build
